# Phase29 hybrid/manual-reviewed wall segment candidate for maze_20260522.jpg.
#
# This is intentionally NOT an automatic detector dump. It is a human-editable
# candidate distilled from Phase28 artifacts plus manual visual review of the
# reference image. Coordinates are normalized source-image percentages with
# origin at top-left. The generator maps them into a candidate 12 m x 12 m world.
#
# Do not overwrite src/tugbot_gazebo/worlds/tugbot_maze_world.sdf with this file's
# generated output until a later human acceptance phase explicitly promotes it.

schema_version: 1
review_status: hybrid_manual_reviewed_candidate
source_image: src/tugbot_maze/assets/maze_20260522.jpg
phase28_report: doc/doc_report/phase28_maze_world_fidelity_audit_report.md
phase28_overlay_reference: log/phase28_maze_world_fidelity/08_generated_wall_segments_overlay_static_detected.png

transform:
  image_width_px: 1000
  image_height_px: 1000
  coordinate_origin: top_left
  percent_coordinates: true
  world_bounds_m:
    xmin: -6.0
    xmax: 6.0
    ymin: -6.0
    ymax: 6.0
  mapping:
    x_m: xmin + x_pct / 100.0 * (xmax - xmin)
    y_m: ymax - y_pct / 100.0 * (ymax - ymin)
  notes:
    - Phase28 showed metadata 0.02 m/px implied 20 m, while scaffold spans 12 m.
    - Phase29 keeps a 12 m candidate extent for continuity with entrance/exit and existing launch assumptions.
    - This transform is explicit and reversible but still a candidate, not promoted ground truth.

wall_defaults:
  thickness_m: 0.24
  height_m: 1.2
  z_center_m: 0.6
  material_rgba: [0.92, 0.92, 0.90, 1.0]

generation_policy:
  do_not_overwrite_scaffold_world: true
  candidate_world_name: tugbot_maze_world_image_faithful
  candidate_output: src/tugbot_gazebo/worlds/tugbot_maze_world_image_faithful.sdf
  baseline_scaffold_world: src/tugbot_gazebo/worlds/tugbot_maze_world.sdf
  source_type: hybrid_manual_reviewed_vectorization
  automatic_detector_dump_used_directly: false

